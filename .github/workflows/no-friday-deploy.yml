name: No Deploy on Friday

on:
  pull_request:
    branches: [main]

jobs:
  no-friday-deploy:
    name: Don't Deploy on Friday
    runs-on: ubuntu-latest
    steps:
      - name: Don't deploy on Friday
        run: |
          DAY=$(date +%u)
          if [ "$DAY" -eq 5 ]; then
            echo "❌ Merges para main são bloqueados às sextas-feiras."
            exit 1
          fi
          echo "✅ Hoje não é sexta-feira. Pode prosseguir."
