name: Tag Version

on:
  push:
    branches: [main]

jobs:
  tag:
    name: Detect and Tag New Version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect and tag new version
        uses: salsify/action-detect-and-tag-new-version@v2
        with:
          version-command: |
            node -p "require('./package.json').version"
